# Local overlay: images built with `docker compose build` (Compose project AI_Property_Triage)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: zbeedatm/property-triage-webui
    newName: ai_property_triage-webui
    newTag: latest
  - name: zbeedatm/property-triage-guardrails
    newName: ai_property_triage-guardrails
    newTag: latest
  - name: zbeedatm/property-triage-rag
    newName: ai_property_triage-rag
    newTag: latest
  - name: zbeedatm/property-triage-image_analyser
    newName: ai_property_triage-image_analyser
    newTag: latest
  - name: zbeedatm/property-triage-langgraph_agent
    newName: ai_property_triage-langgraph_agent
    newTag: latest

patches:
  - path: image-pull-policy.yaml
