apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      initContainers:
        - name: import-workflow
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ ! -f /home/node/.n8n/.workflow_imported ]; then
                n8n import:workflow --input=/workflow/flow.json
                n8n update:workflow --id=KTmqpo6jEYzPBoKR --active=true 2>/dev/null || true
                touch /home/node/.n8n/.workflow_imported
              fi
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: flow-json
              mountPath: /workflow
              readOnly: true
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-env
                optional: true
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
        - name: flow-json
          configMap:
            name: n8n-flow
            items:
              - key: flow.json
                path: flow.json
