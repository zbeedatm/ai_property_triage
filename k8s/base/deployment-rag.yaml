apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  labels:
    app.kubernetes.io/name: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag
    spec:
      containers:
        - name: rag
          image: zbeedatm/property-triage-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: rag-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
