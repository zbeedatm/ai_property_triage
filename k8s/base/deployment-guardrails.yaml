apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails
  labels:
    app.kubernetes.io/name: guardrails
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guardrails
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guardrails
    spec:
      containers:
        - name: guardrails
          image: zbeedatm/property-triage-guardrails:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: guardrails-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
