apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent
  labels:
    app.kubernetes.io/name: langgraph-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph-agent
    spec:
      containers:
        - name: langgraph-agent
          image: zbeedatm/property-triage-langgraph_agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: langgraph-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
