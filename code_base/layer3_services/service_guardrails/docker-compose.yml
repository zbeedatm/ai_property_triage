version: "3.9"

# Standalone — run only the Guardrails service:
#   docker compose up --build

services:
  guardrails:
    build: .
    container_name: property_guardrails
    ports:
      - "8003:8000"          # host:container
    env_file:
      - ../../../docker/secrets/guardrails.env
      # - .env    # local dev .env (not used in Docker)
    environment:
      - RAILS_CONFIG_PATH=/app/rails
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
