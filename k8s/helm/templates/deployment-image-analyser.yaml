{{- if .Values.imageAnalyser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-analyser
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: image-analyser
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: image-analyser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-analyser
    spec:
      containers:
        - name: image-analyser
          image: {{ include "property-triage.image" .Values.images.imageAnalyser }}
          imagePullPolicy: {{ .Values.images.imageAnalyser.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.imageAnalyser.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.imageAnalyser.secretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            {{- toYaml .Values.imageAnalyser.resources | nindent 12 }}
{{- end }}
