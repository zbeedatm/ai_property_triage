# Optional — requires an Ingress controller (nginx, ALB, Traefik, …).
# Apply manually: kubectl apply -f k8s/base/ingress.yaml -n property-triage
# Edit hostnames and TLS before production use.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: property-triage
  labels:
    app.kubernetes.io/name: property-triage
  annotations:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: property-triage.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webui
                port:
                  number: 7860
    - host: n8n.property-triage.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
