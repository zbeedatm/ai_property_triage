{{- if .Values.guardrails.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrails
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: guardrails
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guardrails
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guardrails
    spec:
      containers:
        - name: guardrails
          image: {{ include "property-triage.image" .Values.images.guardrails }}
          imagePullPolicy: {{ .Values.images.guardrails.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.guardrails.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.guardrails.secretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.guardrails.resources | nindent 12 }}
{{- end }}
