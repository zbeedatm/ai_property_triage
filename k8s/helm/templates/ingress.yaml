{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: property-triage
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: property-triage
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hosts.webui }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webui
                port:
                  number: {{ .Values.webui.port }}
    - host: {{ .Values.ingress.hosts.n8n }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678
{{- end }}
