version: "3.9"

# Standalone — run only the LangGraph Agent service:
#   docker compose up --build

services:
  langgraph_agent:
    build: .
    container_name: property_langgraph_agent
    ports:
      - "8004:8000"          # host:container
    env_file:
      - ../../../docker/secrets/langgraph.env
      # - .env    # local dev .env (not used in Docker)
    environment:
      # When running standalone, other services are on the host
      - RAG_PINECONE_URL=http://host.docker.internal:8001
      - RAG_CHROMA_URL=http://host.docker.internal:8001
      - IMAGE_SERVICE_URL=http://host.docker.internal:8002

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
