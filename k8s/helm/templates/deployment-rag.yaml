{{- if .Values.rag.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag
    spec:
      containers:
        - name: rag
          image: {{ include "property-triage.image" .Values.images.rag }}
          imagePullPolicy: {{ .Values.images.rag.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rag.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.rag.secretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.rag.resources | nindent 12 }}
{{- end }}
