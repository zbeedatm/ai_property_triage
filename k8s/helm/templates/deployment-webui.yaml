{{- if .Values.webui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webui
    spec:
      containers:
        - name: webui
          image: {{ include "property-triage.image" .Values.images.webui }}
          imagePullPolicy: {{ .Values.images.webui.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.webui.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.webui.secretName }}
          resources:
            {{- toYaml .Values.webui.resources | nindent 12 }}
{{- end }}
