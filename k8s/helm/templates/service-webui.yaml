{{- if .Values.webui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: webui
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: webui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: webui
  ports:
    - name: http
      port: {{ .Values.webui.port }}
      targetPort: http
{{- end }}
