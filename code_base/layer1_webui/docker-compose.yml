version: "3.9"

# Standalone — run only the WebUI service:
#   docker compose up --build

services:
  webui:
    build: .
    container_name: property_webui
    ports:
      - "7860:7860"
    env_file:
      - ../../docker/secrets/webui.env
      # - .env    # local dev .env (not used in Docker)
    environment:
      # Override webhook when n8n runs on the host (not in the same compose stack)
      - N8N_WEBHOOK_URL=http://host.docker.internal:5678/webhook/property-triage

    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
