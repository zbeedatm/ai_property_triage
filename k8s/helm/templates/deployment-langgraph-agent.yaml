{{- if .Values.langgraphAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-agent
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: langgraph-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langgraph-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langgraph-agent
    spec:
      containers:
        - name: langgraph-agent
          image: {{ include "property-triage.image" .Values.images.langgraphAgent }}
          imagePullPolicy: {{ .Values.images.langgraphAgent.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.langgraphAgent.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.langgraphAgent.secretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            {{- toYaml .Values.langgraphAgent.resources | nindent 12 }}
{{- end }}
