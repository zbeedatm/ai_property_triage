{{- if .Values.guardrails.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: guardrails
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: guardrails
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: guardrails
  ports:
    - name: http
      port: {{ .Values.guardrails.port }}
      targetPort: http
{{- end }}
