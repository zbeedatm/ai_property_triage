{{- if .Values.n8n.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: {{ include "property-triage.namespace" . }}
  labels:
    {{- include "property-triage.labels" . | nindent 4 }}
    app.kubernetes.io/name: n8n
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
{{- end }}
